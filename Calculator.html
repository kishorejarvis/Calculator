<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>

  
</head>

<body>

  <div class="calculator">
<h1 id="title">Calculator</h1>
    <input type="text" id="display" readonly>

    <div class="buttons">

      <button class="clear" onclick="clearDisplay()">C</button>
      <button class="btn" onclick="appendValue('/')">/</button>
      <button class="btn" onclick="appendValue('*')">*</button>
      <button class="btn" onclick="appendValue('-')">-</button>

      <button class="btn" onclick="appendValue('7')">7</button>
      <button class="btn" onclick="appendValue('8')">8</button>
      <button class="btn" onclick="appendValue('9')">9</button>
      <button class="btn" onclick="appendValue('+')">+</button>

      <button class="btn" onclick="appendValue('4')">4</button>
      <button class="btn" onclick="appendValue('5')">5</button>
      <button class="btn" onclick="appendValue('6')">6</button>
      <button class="btnn" onclick="deleteLast()">⌫</button>

      <button class="btn" onclick="appendValue('1')">1</button>
      <button class="btn" onclick="appendValue('2')">2</button>
      <button class="btn" onclick="appendValue('3')">3</button>
      <button class="equal" onclick="calculate()">=</button>
      <button class="btn" onclick="appendValue('00')">00</button>
      <button class="btn" onclick="appendValue('0')">0</button>
      <button class="btn" onclick="appendValue('.')">.</button>

    </div>

  </div>
  <style>
    
   
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #3b3939;
      font-family: Arial;
    }

    .calculator {
      background: linear-gradient(to right, #272829, #3f4042, #454549, #272729);
      padding: 20px;
      border-radius: 15px;
      width: 290px;
      box-shadow: 0px 0px 15px rgb(180, 180, 180);
    }

    #display {
      width: 100%;
      height: 60px;
      margin-bottom: 15px;
      font-size: 28px;
      text-align: right;
      background: linear-gradient(to right, #616268, #5b5d70);
      color: white;
      border: none;
      border-radius: 8px;
      padding-right: 10px;
      box-sizing: border-box;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      height: 60px;
      font-size: 24px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .btn {
      background: #9f9d9d;
    }
    .btn:hover {
      transform: scale(1.05);
      transition: 0.2s;
    }

    .clear {
      background: linear-gradient(to right, #ef6c6c, #f90404);
      color: white;
    }

    .clear:hover {
      transform: scale(1.05);
      transition: 0.2s;
    }
    .equal {
      background: linear-gradient(to right, #6680f2, #041bed);
      color: white;
      grid-row: span 2;
      height: 130px;
    }

    .equal:hover {
      transform: scale(1.05);
      transition: 0.2s;
    }
    .btnn {
      background: linear-gradient(to right, #f2a365, #f76c6c);
      color: white;
    }
  </style>

  <script>

    function appendValue(value) {  // value is button value and appendValue function appends the value 
      document.getElementById("display").value += value;
    }

    function clearDisplay() {
      document.getElementById("display").value = "";// clear button clear display C
    }

    function deleteLast() {  // delete button delete last character 
      let current = document.getElementById("display").value;
      document.getElementById("display").value = current.slice(0, -1);
        
    }

    function calculate() {

      try { // eval() function evaluates  display and returns the result

        let result = eval(document.getElementById("display").value);

        document.getElementById("display").value = result;

      }

      catch {

        document.getElementById("display").value = "Error";

      }

    }

    document.addEventListener("keydown", function (e) { // keyboard support for calculator

      if ("0123456789+-*/.".includes(e.key)) {
        appendValue(e.key);
      }
      else if (e.key === "Enter") {

        calculate(); // Enter key to calculate
      }
      else if (e.key === "Backspace") {

        deleteLast();// Backspace key to delete last character
      }
      else if(e.key==="Escape"){

        clearDisplay();   // Escape key to clear display
      }
    });
  </script>
</body>
</html>
